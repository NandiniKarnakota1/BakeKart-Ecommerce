<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport"
		  content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet"
		  href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
		  integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
		  crossorigin="anonymous">
	<link rel="stylesheet"
		  href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
		  integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ"
		  crossorigin="anonymous">
	<title>Add / Update Product</title>
	<style>
		.container {
            margin-left: 200px;
            margin-top: 50px;
        }
        img {
            opacity: 0.8;
            margin-top: 10px;
        }
        .form-group > label {
            color: #333;
            font-size: 16px;
        }
	</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
	<div class="container-fluid">
		<a class="navbar-brand" href="#">
			<img th:src="@{/images/logo.png}" width="60" height="50" alt="Logo"/>
		</a>
		<ul class="navbar-nav ml-auto">
			<li class="nav-item"><a class="nav-link" th:href="@{/admin}">Logout</a></li>
		</ul>
	</div>
</nav>

<div class="container">
	<h3 th:text="${productDTO.id == null ? 'Add New Product' : 'Update Product'}"></h3>

	<form th:action="@{/admin/products/add}" th:object="${productDTO}" method="post" enctype="multipart/form-data">

		<input type="hidden" th:field="*{id}"/>

		<div class="form-group">
			<label for="name">Name</label>
			<input type="text" th:field="*{name}" class="form-control" id="name" placeholder="Enter product name" required/>
		</div>

		<div class="form-group">
			<label for="category">Category</label>
			<select th:field="*{categoryId}" class="form-control" id="category" required>
				<option th:each="category : ${categories}"
						th:value="${category.id}"
						th:text="${category.name}">
				</option>
			</select>
		</div>

		<div class="form-group">
			<label for="price">Price</label>
			<input type="number" th:field="*{price}" class="form-control" id="price" placeholder="Enter price" required/>
		</div>

		<div class="form-group">
			<label for="weight">Weight (grams)</label>
			<input type="number" th:field="*{weight}" class="form-control" id="weight" placeholder="Enter weight" required/>
		</div>

		<div class="form-group">
			<label for="description">Description</label>
			<textarea th:field="*{description}" class="form-control" id="description" rows="5"></textarea>
		</div>

		<div class="form-group">
			<label>Product Image</label>
			<input type="file" name="productImage" id="productImage" class="form-control-file" accept="image/*"/>
			<input type="hidden" name="imgName" th:value="*{imageName}"/>
			<img id="imgPreview" th:if="*{imageName != null}"
				 th:src="@{'/productImages/' + ${productDTO.imageName}}"
				 width="100" height="100" alt="Product Image"/>
		</div>

		<button type="submit" class="btn btn-success">
			<span th:text="${productDTO.id == null ? 'Add Product' : 'Update Product'}"></span>
		</button>
	</form>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
<script>
	// Image preview
	function readURL(input) {
		if (input.files && input.files[0]) {
			var reader = new FileReader();
			reader.onload = function(e) {
				$('#imgPreview').attr('src', e.target.result).width(100).height(100);
			}
			reader.readAsDataURL(input.files[0]);
		}
	}
	$('#productImage').change(function() {
		readURL(this);
	});
</script>

</body>
</html>
